name: smoke

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1,wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install native Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build:native-management

      - run: cargo build -p VRX-64-native
      - run: cargo test -p VRX-64-slide -p VRX-64-kernel
      - run: cargo test -p VRX-64-native smoke

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1,wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-web-

      - name: Install native Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build:ui

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build web host WASM
        working-directory: VRX-64-web
        run: wasm-pack build --target web --out-dir web-preview/pkg --no-opt

      - name: Build native bundle
        run: cargo build -p VRX-64-native

      - name: Copy loading.vzglyd to web-preview
        run: |
          VZGLYD=$(find target -name 'loading.vzglyd' -print -quit)
          test -n "$VZGLYD"
          cp "$VZGLYD" VRX-64-web/web-preview/loading.vzglyd

      - run: npx playwright install chromium --with-deps

      - name: Serve preview and run Playwright smoke test
        run: |
          npx serve -l 8080 . &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" || true' EXIT
          sleep 1
          npx playwright test tests/web-smoke.spec.js
